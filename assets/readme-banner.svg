<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">OneNote Desktop Agent</title>
  <desc id="desc">A banner for a Claude Code and Codex plugin that automates Microsoft OneNote desktop through Windows PowerShell COM.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef7f6"/>
      <stop offset="1" stop-color="#f4effb"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="notebook" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8f4bd8"/>
      <stop offset="1" stop-color="#56359f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#243042" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="0" fill="url(#bg)"/>
  <path d="M0 410 C260 330 430 470 690 382 C960 290 1130 355 1600 250 L1600 520 L0 520 Z" fill="#dff4ef" opacity="0.8"/>
  <path d="M0 84 C230 142 392 20 650 86 C940 160 1110 96 1600 134 L1600 0 L0 0 Z" fill="#efe6fa" opacity="0.75"/>

  <g transform="translate(870 86)" filter="url(#shadow)">
    <rect x="0" y="0" width="540" height="326" rx="18" fill="#273140"/>
    <rect x="24" y="24" width="492" height="278" rx="10" fill="url(#screen)"/>
    <rect x="86" y="302" width="368" height="24" rx="6" fill="#1f2937"/>
    <rect x="186" y="326" width="168" height="38" rx="8" fill="#334155"/>
    <rect x="128" y="362" width="284" height="18" rx="9" fill="#475569"/>

    <g transform="translate(62 62)">
      <rect x="0" y="0" width="190" height="202" rx="14" fill="url(#notebook)"/>
      <rect x="34" y="0" width="156" height="202" rx="14" fill="#ffffff" opacity="0.94"/>
      <rect x="0" y="0" width="34" height="202" rx="14" fill="#6d3dbb"/>
      <circle cx="17" cy="42" r="4" fill="#d8c8f0"/>
      <circle cx="17" cy="86" r="4" fill="#d8c8f0"/>
      <circle cx="17" cy="130" r="4" fill="#d8c8f0"/>
      <rect x="58" y="44" width="96" height="12" rx="6" fill="#5b35a8"/>
      <rect x="58" y="78" width="108" height="8" rx="4" fill="#94a3b8"/>
      <rect x="58" y="102" width="86" height="8" rx="4" fill="#94a3b8"/>
      <rect x="58" y="126" width="116" height="8" rx="4" fill="#94a3b8"/>
      <rect x="58" y="150" width="72" height="8" rx="4" fill="#94a3b8"/>
    </g>

    <g transform="translate(300 78)">
      <rect x="0" y="0" width="164" height="118" rx="12" fill="#111827"/>
      <circle cx="24" cy="24" r="5" fill="#ef4444"/>
      <circle cx="42" cy="24" r="5" fill="#f59e0b"/>
      <circle cx="60" cy="24" r="5" fill="#22c55e"/>
      <text x="24" y="61" font-family="Consolas, 'SFMono-Regular', monospace" font-size="17" fill="#67e8f9">&gt; COM</text>
      <text x="24" y="88" font-family="Consolas, 'SFMono-Regular', monospace" font-size="17" fill="#c4b5fd">STA OK</text>
    </g>

    <g fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <path d="M276 224 C310 190 348 184 390 206"/>
      <path d="M248 170 C286 156 312 138 334 112"/>
      <path d="M210 242 C256 260 308 270 366 250"/>
    </g>
    <g fill="#0f766e">
      <circle cx="276" cy="224" r="11"/>
      <circle cx="390" cy="206" r="11"/>
      <circle cx="334" cy="112" r="11"/>
      <circle cx="366" cy="250" r="11"/>
    </g>
  </g>

  <g transform="translate(120 126)">
    <rect x="0" y="-22" width="224" height="38" rx="19" fill="#0f766e" opacity="0.12"/>
    <text x="20" y="4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f766e">WINDOWS • POWERSHELL • COM</text>
    <text x="0" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#172033">OneNote</text>
    <text x="0" y="168" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#56359f">Desktop Agent</text>
    <text x="4" y="222" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" fill="#334155">Claude Code and Codex automation</text>
    <text x="4" y="260" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" fill="#334155">for Microsoft OneNote desktop</text>
  </g>
</svg>
